<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>לוח מודעות בית כנסת</title>
    <meta http-equiv="refresh" content="3600">
    
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            overflow: hidden; /* מניעת גלילה */
            text-align: center;
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 90vh;
        }

        h1 { font-size: 80px; margin-bottom: 10px; color: #ffd700; }
        .time-row { font-size: 60px; margin: 15px 0; }
        .label { color: #aaa; margin-left: 15px; }
        
        #status {
            position: fixed;
            bottom: 10px;
            left: 10px;
            font-size: 14px;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="parsha-name" style="font-size: 100px; color: #00ff00;">טוען נתונים...</div>
        
        <div class="time-row">
            <span class="label">כניסת שבת:</span>
            <span id="shabbat-in">--:--</span>
        </div>
        
        <div class="time-row">
            <span class="label">צאת שבת:</span>
            <span id="shabbat-out">--:--</span>
        </div>
    </div>

    <div id="status">V1.0</div>

    <script>
        async function loadData() {
            const statusEl = document.getElementById('status');
            const parshaEl = document.getElementById('parsha-name');
            
            try {
                // הוספת סימן שאלה וזמן מונעת מהדפדפן להציג מידע ישן מהזיכרון
                const response = await fetch('data.json?v=' + Date.now());
                
                if (!response.ok) throw new Error('Network not ready');

                const data = await response.json();

                // השמת הנתונים בתוך האלמנטים
                parshaEl.innerText = data.parsha;
                document.getElementById('shabbat-in').innerText = data.shabbatIn;
                document.getElementById('shabbat-out').innerText = data.shabbatOut;
                
                statusEl.innerText = "עודכן לאחרונה: " + new Date().toLocaleTimeString('he-IL');
                statusEl.style.color = "#004400";

            } catch (error) {
                console.error("טעות בטעינה:", error);
                parshaEl.innerText = "מתחבר לרשת...";
                statusEl.innerText = "מנסה להתחבר שוב...";
                statusEl.style.color = "#440000";
                
                // אם נכשל, מנסה שוב בעוד 5 שניות
                setTimeout(loadData, 5000);
            }
        }

        // הפעלה ראשונה בעת עליית הדף
        loadData();

        // עדכון שקט של הנתונים כל 10 דקות (בלי לרענן את כל הדף)
        setInterval(loadData, 600000);
    </script>
</body>
</html>
