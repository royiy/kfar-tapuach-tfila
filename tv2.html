<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בית הכנסת המרכזי – תצוגת מסך</title>
    <link href="https://fonts.googleapis.com/css2?family=Alef:wght@400;700&family=Frank+Ruhl+Libre:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-navy: #0a1628; 
            --royal-blue: #1e3a5f; 
            --gold: #d4af37;
            --warm-gold: #f4e4c1; 
            --cream: #faf8f3; 
            --soft-white: #ffffff;
            --charcoal: #2a2a2a; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Alef', sans-serif; 
            background: var(--cream); 
            height: 100vh;
            width: 100vw;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        .hero { 
            background: linear-gradient(165deg, var(--deep-navy) 0%, var(--royal-blue) 100%); 
            padding: 2vh 3vw; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 6px solid var(--gold);
            flex-shrink: 0;
            z-index: 10;
        }
        
        .synagogue-title { font-family: 'Frank Ruhl Libre', serif; font-size: 4.5vh; font-weight: 900; color: var(--soft-white); }
        .location { font-family: 'Frank Ruhl Libre', serif; font-size: 2.2vh; color: var(--warm-gold); }
        #live-clock { font-family: 'Frank Ruhl Libre', serif; font-size: 5vh; font-weight: 700; color: var(--warm-gold); direction: ltr; }

        /* ── מסכים מתחלפים ── */
        .screen-container {
            flex: 1;
            position: relative;
            width: 100%;
        }

        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none; /* ברירת מחדל מוסתר */
            animation: fadeIn 0.8s ease-in-out;
        }

        .screen.active { display: block; }

        /* מסך זמנים */
        .times-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 2vw;
            padding: 3vh 2vw;
            height: 100%;
        }

        /* מסך הודעות */
        .announcement-screen {
            display: none;
            height: 100%;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: radial-gradient(circle, var(--soft-white) 0%, #f0ede3 100%);
        }
        
        .announcement-screen.active { display: flex; flex-direction: column; }

        .announcement-card {
            background: white;
            padding: 8vh 5vw;
            border-radius: 40px;
            border: 10px solid var(--royal-blue);
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            max-width: 80%;
        }

        .announcement-title {
            font-family: 'Frank Ruhl Libre', serif;
            font-size: 8vh;
            color: var(--royal-blue);
            margin-bottom: 4vh;
            font-weight: 900;
        }

        .announcement-text {
            font-size: 5vh;
            color: var(--charcoal);
            line-height: 1.4;
        }

        .warning-text { color: #b22222; font-weight: 700; }

        /* ── אלמנטים נוספים ── */
        .column-card { 
            background: white; border-radius: 20px; padding: 2.5vh 2vw; 
            box-shadow: 0 10px 30px rgba(30,58,95,0.1); border-top: 6px solid var(--gold);
        }
        .time-item { display: flex; justify-content: space-between; padding: 1.2vh 0; border-bottom: 1px solid #f5f2e8; font-size: 2.5vh; }
        .time-value { font-family: 'Frank Ruhl Libre', serif; font-size: 3.2vh; font-weight: 700; color: var(--royal-blue); }

        .memorial-section { background: var(--deep-navy); padding: 1.5vh; text-align: center; border-top: 2px solid var(--gold); }
        .memorial-name { font-family: 'Frank Ruhl Libre', serif; font-size: 2.8vh; color: var(--warm-gold); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <header class="hero">
        <div>
            <div class="synagogue-title">בית הכנסת המרכזי</div>
            <div class="location">כפר תפוח</div>
        </div>
        <div id="live-clock">--:--:--</div>
    </header>

    <div class="screen-container">
        <div id="screen-times" class="screen active">
            <div class="times-grid">
                <div class="column-card">
                    <h2 style="font-size: 4vh; color: var(--royal-blue); margin-bottom: 2vh;">ערב שבת</h2>
                    <div id="erev-shabbat-list">
                        <div class="time-item"><span>הדלקת נרות</span><span id="candle-lighting" class="time-value">--:--</span></div>
                        <div class="time-item"><span>מנחה</span><span id="fri-mincha" class="time-value">--:--</span></div>
                    </div>
                </div>
                <div class="column-card">
                    <h2 style="font-size: 4vh; color: var(--royal-blue); margin-bottom: 2vh;">יום השבת</h2>
                    <div class="time-item"><span>שחרית</span><span class="time-value">08:00</span></div>
                    <div class="time-item"><span>מנחה</span><span class="time-value">17:15</span></div>
                    <div class="time-item"><span>צאת שבת</span><span id="tzeit-shabbat" class="time-value">--:--</span></div>
                </div>
                <div class="column-card">
                    <h2 style="font-size: 4vh; color: var(--royal-blue); margin-bottom: 2vh;">הודעות</h2>
                    <p style="font-size: 2.5vh;">שיעור דף היומי בכל יום אחרי ערבית</p>
                </div>
            </div>
        </div>

        <div id="screen-chametz" class="screen announcement-screen">
            <div class="announcement-card">
                <div class="announcement-title">שימו לב!</div>
                <div class="announcement-text warning-text">נא לא להכניס חמץ<br>לשטח בית הכנסת</div>
            </div>
        </div>

        <div id="screen-fees" class="screen announcement-screen">
            <div class="announcement-card">
                <div class="announcement-title">תזכורת חשובה</div>
                <div class="announcement-text">חברים שטרם הסדירו<br>את תשלום דמי החבר<br>מתבקשים לפנות לגזבר</div>
            </div>
        </div>
    </div>

    <footer class="memorial-section">
        <div id="memorial-text" class="memorial-name">לעילוי נשמת כל נפטרי הקהילה</div>
    </footer>

    <script>
        // ניהול החלפת מסכים
        const screens = document.querySelectorAll('.screen');
        let currentScreenIndex = 0;

        function rotateScreens() {
            screens[currentScreenIndex].classList.remove('active');
            currentScreenIndex = (currentScreenIndex + 1) % screens.length;
            screens[currentScreenIndex].classList.add('active');
        }

        // החלפת מסך כל 15 שניות
        setInterval(rotateScreens, 15000);

        // שעון חי
        function updateClock() {
            const now = new Date();
            document.getElementById('live-clock').textContent = 
                now.toLocaleTimeString('he-IL', { hour12: false });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // טעינת נתונים (דוגמה)
        async function loadData() {
            try {
                const res = await fetch('data.json');
                const data = await res.json();
                document.getElementById('candle-lighting').textContent = data.shabbat_times.erev_shabbat.candle_lighting;
                document.getElementById('tzeit-shabbat').textContent = data.shabbat_times.shabbat_day.tzeit_shabbat;
                document.getElementById('fri-mincha').textContent = data.shabbat_times.erev_shabbat.candle_lighting; // דוגמה
            } catch (e) { console.log("Data load error"); }
        }
        loadData();
    </script>
</body>
</html>
