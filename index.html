<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>זמני תפילה כפר תפוח</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alef&family=Frank+Ruhl+Libre:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-navy: #0a1628;
            --royal-blue: #1e3a5f;
            --gold: #d4af37;
            --cream: #faf8f3;
            --soft-white: #ffffff;
            --charcoal: #2a2a2a;
            --bg-color: var(--cream);
            --card-bg: var(--soft-white);
            --text-main: var(--charcoal);
            --chip-bg: #e8f2ff;
            --border-color: rgba(30, 58, 95, 0.1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --card-bg: #1e1e1e;
                --text-main: #e0e0e0;
                --royal-blue: #4a90e2;
                --chip-bg: #2c3e50;
                --border-color: rgba(255, 255, 255, 0.1);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Alef', sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding-bottom: 2rem;
            transition: background 0.3s ease;
        }

        header {
            background: linear-gradient(135deg, var(--deep-navy) 0%, var(--royal-blue) 100%);
            color: white;
            padding: 1.5rem 1rem;
            text-align: center;
            border-bottom: 3px solid var(--gold);
        }

        .synagogue-name {
            font-family: 'Frank Ruhl Libre', serif;
            font-size: 1.6rem;
            font-weight: 400;
            margin-bottom: 0.2rem;
        }

        .parsha-title {
            color: var(--gold);
            font-size: 1.1rem;
            font-weight: 300;
        }

        .container {
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1.2rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border-right: 4px solid var(--royal-blue);
        }

        .card-header {
            font-family: 'Frank Ruhl Libre', serif;
            font-size: 1.3rem;
            color: var(--royal-blue);
            margin-bottom: 0.8rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.4rem;
            font-weight: 400;
        }

        .time-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.6rem 0;
            border-bottom: 1px solid var(--border-color);
        }

        .time-row:last-child {
            border-bottom: none;
        }

        .label {
            font-size: 1rem;
            opacity: 0.9;
        }

        .value {
            font-family: 'Frank Ruhl Libre', serif;
            font-size: 1.1rem;
            color: var(--royal-blue);
            background: var(--chip-bg);
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
        }

        .highlight .value {
            background: #fff9e6;
            color: #b8860b;
        }

        .weekday-section {
            margin-top: 0.5rem;
        }

        .weekday-label {
            font-size: 0.9rem;
            color: var(--gold);
            margin-bottom: 0.4rem;
            display: block;
        }

        .weekday-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-bottom: 1rem;
        }

        .time-chip {
            background: var(--chip-bg);
            color: var(--royal-blue);
            padding: 0.2rem 0.7rem;
            border-radius: 15px;
            font-size: 0.95rem;
        }

        footer {
            text-align: center;
            font-size: 0.8rem;
            color: #888;
            margin-top: 1.5rem;
        }

        .loading, .error {
            text-align: center;
            padding: 2rem;
            font-size: 1.1rem;
        }

        .error {
            color: #d93025;
        }
    </style>
</head>
<body>

    <header>
        <div class="synagogue-name">בית הכנסת המרכזי כפר תפוח</div>
        <div class="parsha-title" id="parsha-display">טוען...</div>
    </header>

    <main class="container" id="main-content">
        <div class="loading">טוען נתוני תפילה...</div>
    </main>

    <footer>
        נבנה לרווחת המתפללים | תשפ"ו
    </footer>

    <script>
        async function loadPrayerTimes() {
            const container = document.getElementById('main-content');
            try {
                // משיכת הנתונים מקובץ data.json
                const response = await fetch('data.json');
                if (!response.ok) throw new Error('נכשלה טעינת הקובץ');
                
                const data = await response.json();
                
                // עדכון כותרת הפרשה
                document.getElementById('parsha-display').textContent = "פרשת " + data.parsha;

                // בניית התוכן
                container.innerHTML = `
                    <section class="card">
                        <h2 class="card-header">🕯️ ערב שבת</h2>
                        <div class="time-row">
                            <span class="label">מנחה גדולה</span>
                            <span class="value">${data.shabbat_times.erev_shabbat.mincha_gedola}</span>
                        </div>
                        <div class="time-row highlight">
                            <span class="label">הדלקת נרות</span>
                            <span class="value">${data.shabbat_times.erev_shabbat.candle_lighting}</span>
                        </div>
                        <div class="time-row">
                            <span class="label">צאת הכוכבים</span>
                            <span class="value">${data.shabbat_times.erev_shabbat.tzeit_hakochavim}</span>
                        </div>
                    </section>

                    <section class="card">
                        <h2 class="card-header">✡️ יום השבת</h2>
                        <div class="time-row">
                            <span class="label">שקיעה</span>
                            <span class="value">${data.shabbat_times.shabbat_day.shkiya}</span>
                        </div>
                        <div class="time-row highlight">
                            <span class="label">צאת שבת</span>
                            <span class="value">${data.shabbat_times.shabbat_day.tzeit_shabbat}</span>
                        </div>
                    </section>

                    <section class="card">
                        <h2 class="card-header">📅 ימי חול</h2>
                        <div class="weekday-section">
                            <span class="weekday-label">מנחה:</span>
                            <div class="weekday-list">
                                ${data.weekday_times.mincha.map(t => `<span class="time-chip">${t}</span>`).join('')}
                            </div>
                        </div>
                        <div class="weekday-section">
                            <span class="weekday-label">ערבית:</span>
                            <div class="weekday-list">
                                ${data.weekday_times.arvit.map(t => `<span class="time-chip">${t}</span>`).join('')}
                            </div>
                        </div>
                    </section>
                `;
            } catch (err) {
                container.innerHTML = `
                    <div class="error">
                        חלקה שגיאה בטעינת הנתונים.<br>
                        וודא שקובץ data.json נמצא בשרת.
                    </div>
                `;
                console.error('Error fetching JSON:', err);
            }
        }

        // הפעלה בעת טעינת הדף
        window.addEventListener('DOMContentLoaded', loadPrayerTimes);
    </script>
</body>
</html>
