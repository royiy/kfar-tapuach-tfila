```html
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בית הכנסת המרכזי כפר תפוח</title>

<link href="https://fonts.googleapis.com/css2?family=Alef:wght@400;700&family=Frank+Ruhl+Libre:wght@300;400;500;700;900&display=swap" rel="stylesheet">

<style>
:root{
--deep-navy:#0a1628;
--royal-blue:#1e3a5f;
--gold:#d4af37;
--warm-gold:#f4e4c1;
--cream:#faf8f3;
--soft-white:#ffffff;
--charcoal:#2a2a2a;
--shadow-blue:rgba(30,58,95,0.15);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Alef',sans-serif;
background:var(--cream);
color:var(--charcoal);
line-height:1.8;
overflow-x:hidden;
}

/* HERO */

.hero{
position:relative;
background:linear-gradient(165deg,var(--deep-navy) 0%,var(--royal-blue) 50%,#2d5580 100%);
padding:5rem 2rem 6rem;
text-align:center;
overflow:hidden;
}

.hero::before{
content:'';
position:absolute;
top:0;left:0;right:0;bottom:0;
background:
radial-gradient(circle at 20% 30%,rgba(212,175,55,0.08) 0%,transparent 50%),
radial-gradient(circle at 80% 70%,rgba(212,175,55,0.05) 0%,transparent 50%);
pointer-events:none;
}

.hero::after{
content:'';
position:absolute;
bottom:-2px;
left:0;right:0;
height:100px;
background:var(--cream);
clip-path:polygon(0 50%,100% 0,100% 100%,0 100%);
}

.hero-content{
position:relative;
z-index:1;
max-width:900px;
margin:0 auto;
}

.synagogue-title{
font-family:'Frank Ruhl Libre',serif;
font-size:clamp(2.5rem,6vw,4.5rem);
font-weight:900;
color:var(--soft-white);
margin-bottom:.5rem;
}

.location{
font-family:'Frank Ruhl Libre',serif;
font-size:clamp(1.2rem,3vw,1.8rem);
color:var(--warm-gold);
margin-bottom:2rem;
}

.decorative-line{
width:120px;
height:3px;
background:linear-gradient(90deg,transparent,var(--gold),transparent);
margin:0 auto;
}

/* CONTAINER */

.container{
max-width:1200px;
margin:0 auto;
padding:0 2rem 4rem;
}

.section{
background:var(--soft-white);
border-radius:20px;
padding:3rem 2.5rem;
margin-bottom:3rem;
box-shadow:0 10px 40px var(--shadow-blue);
border-top:6px solid var(--gold);
}

.section-header{
display:flex;
align-items:center;
gap:1rem;
margin-bottom:2.5rem;
padding-bottom:1.5rem;
border-bottom:2px solid #f0ede3;
}

.section-icon{font-size:2.5rem}

.section-title{
font-family:'Frank Ruhl Libre',serif;
font-size:2rem;
font-weight:700;
color:var(--royal-blue);
}

/* SHABBAT */

.shabbat-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:2.5rem;
}

.shabbat-column h4{
font-family:'Frank Ruhl Libre',serif;
font-size:1.4rem;
color:var(--gold);
margin-bottom:1.5rem;
}

.time-item{
display:flex;
justify-content:space-between;
padding:1rem 0;
border-bottom:1px solid #f5f2e8;
}

.time-value{
font-family:'Frank Ruhl Libre',serif;
font-size:1.2rem;
font-weight:700;
color:var(--royal-blue);
background:linear-gradient(135deg,#e8f2ff,#f0ede3);
padding:.4rem 1rem;
border-radius:8px;
}

.highlight-time{
background:linear-gradient(135deg,#fff9e6,#ffe8b8)!important;
color:#b8860b!important;
}

/* חול */

.schedule-grid{display:grid;gap:1.5rem}

.schedule-row{
background:linear-gradient(135deg,#fafafa,#ffffff);
border-right:4px solid var(--royal-blue);
padding:1.2rem 1.5rem;
border-radius:12px;
display:flex;
justify-content:space-between;
}

/* שיעורים */

.shiur-card{
background:linear-gradient(135deg,#fffbf0,#fff8e6);
border-radius:16px;
padding:2rem;
border-right:5px solid var(--gold);
box-shadow:0 4px 15px rgba(212,175,55,.2);
margin-bottom:1rem;
}

.shiur-title{
font-family:'Frank Ruhl Libre',serif;
font-size:1.4rem;
font-weight:700;
color:var(--royal-blue);
}

/* תרומות */

.donation-section{
background:linear-gradient(165deg,var(--royal-blue) 0%,var(--deep-navy) 100%);
color:var(--soft-white);
text-align:center;
position:relative;
}

.donation-section::before{
content:'';
position:absolute;
top:0;left:0;right:0;bottom:0;
background:
radial-gradient(circle at 30% 40%,rgba(212,175,55,0.1) 0%,transparent 50%),
radial-gradient(circle at 70% 60%,rgba(212,175,55,0.08) 0%,transparent 50%);
pointer-events:none;
}

.donation-section .section-title{
color:var(--warm-gold);
}

.donation-intro{
font-size:1.2rem;
margin-bottom:2rem;
opacity:.95;
}

.bank-details{
background:rgba(255,255,255,.1);
backdrop-filter:blur(10px);
border:2px solid rgba(212,175,55,.3);
border-radius:16px;
padding:2rem;
margin:2rem auto;
max-width:500px;
line-height:2;
}

.bank-details strong{
color:var(--warm-gold);
}

.paybox-button{
display:inline-block;
background:linear-gradient(135deg,#00a0e9,#0077b6);
color:white;
text-decoration:none;
padding:1rem 2.5rem;
border-radius:50px;
font-weight:700;
margin-top:1.5rem;
}

/* MEMORIAL */

.memorial-section{
background:var(--deep-navy);
color:var(--warm-gold);
padding:3rem 2rem;
text-align:center;
}

.memorial-container{
position:relative;
height:60px;
display:flex;
align-items:center;
justify-content:center;
}

.memorial-item{
position:absolute;
opacity:0;
animation:memorialCycle 25s infinite;
}

.memorial-item:nth-child(1){animation-delay:0s}
.memorial-item:nth-child(2){animation-delay:5s}
.memorial-item:nth-child(3){animation-delay:10s}
.memorial-item:nth-child(4){animation-delay:15s}
.memorial-item:nth-child(5){animation-delay:20s}

@keyframes memorialCycle{
0%{opacity:0}
4%{opacity:1}
16%{opacity:1}
20%{opacity:0}
100%{opacity:0}
}

.footer{
background:var(--royal-blue);
color:var(--warm-gold);
text-align:center;
padding:2.5rem;
}
</style>
</head>

<body>

<header class="hero">
<div class="hero-content">
<h1 class="synagogue-title">בית הכנסת המרכזי</h1>
<p class="location">כפר תפוח</p>
<div class="decorative-line"></div>
</div>
</header>

<div class="container">

<!-- תרומות -->

<section class="section donation-section">

<div class="section-header">
<span class="section-icon">💎</span>
<h2 class="section-title">תרומות לבית הכנסת</h2>
</div>

<p class="donation-intro">
נודה לכל תרומה להחזקת ופיתוח בית הכנסת
</p>

<div class="bank-details">
<strong>העברה בנקאית:</strong><br>
בנק מזרחי<br>
סניף 483<br>
מספר חשבון: <strong>437738</strong><br>
ע"ש בית כנסת מרכזי כפר תפוח
</div>

<a href="https://links.payboxapp.com/rBbQDcbaPVb" target="_blank" class="paybox-button">
לתרומה ב-PayBox 💳
</a>

</section>

</div>

</body>
</html>
```
