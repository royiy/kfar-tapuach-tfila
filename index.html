<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בית הכנסת המרכזי כפר תפוח</title>
    <link href="https://fonts.googleapis.com/css2?family=Alef:wght@400;700&family=Frank+Ruhl+Libre:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-navy: #0a1628; --royal-blue: #1e3a5f; --gold: #d4af37;
            --warm-gold: #f4e4c1; --cream: #faf8f3; --soft-white: #ffffff;
            --charcoal: #2a2a2a; --shadow-blue: rgba(30, 58, 95, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Alef', sans-serif; background: var(--cream); color: var(--charcoal); line-height: 1.8; }

        .hero { position: relative; background: linear-gradient(165deg, var(--deep-navy) 0%, var(--royal-blue) 50%, #2d5580 100%); padding: 5rem 2rem 6rem; text-align: center; }
        .hero::after { content: ''; position: absolute; bottom: -2px; left: 0; right: 0; height: 100px; background: var(--cream); clip-path: polygon(0 50%, 100% 0, 100% 100%, 0 100%); }
        .synagogue-title { font-family: 'Frank Ruhl Libre', serif; font-size: 3.5rem; color: var(--soft-white); margin-bottom: 0.5rem; }
        .location { font-family: 'Frank Ruhl Libre', serif; font-size: 1.8rem; color: var(--warm-gold); }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem 4rem; }
        .section { background: var(--soft-white); border-radius: 20px; padding: 2.5rem; margin-bottom: 3rem; box-shadow: 0 10px 40px var(--shadow-blue); position: relative; border-top: 6px solid var(--gold); }
        .section-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem; border-bottom: 2px solid #f0ede3; padding-bottom: 1rem; }
        .section-title { font-family: 'Frank Ruhl Libre', serif; font-size: 2rem; color: var(--royal-blue); }

        .shabbat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2.5rem; }
        .shabbat-column h4 { color: var(--gold); margin-bottom: 1rem; font-size: 1.4rem; border-bottom: 1px solid var(--warm-gold); }
        
        .time-item { display: flex; justify-content: space-between; padding: 0.8rem 0; border-bottom: 1px solid #f5f2e8; }
        .time-value { font-family: 'Frank Ruhl Libre', serif; font-weight: 700; color: var(--royal-blue); background: #f0f4f8; padding: 0.2rem 0.8rem; border-radius: 5px; }
        .highlight-time { background: #fff4d1; color: #b8860b; }

        .schedule-row { background: #f9f9f9; padding: 1rem; border-right: 4px solid var(--royal-blue); margin-bottom: 1rem; display: flex; justify-content: space-between; }
        .schedule-times { font-weight: 700; color: var(--royal-blue); }
    </style>
</head>
<body>

    <header class="hero">
        <div class="hero-content">
            <h1 class="synagogue-title">בית הכנסת המרכזי</h1>
            <p class="location">כפר תפוח</p>
        </div>
    </header>

    <div class="container">
        <section class="section">
            <div class="section-header">
                <h2 class="section-title" id="parsha-title">זמני השבת</h2>
            </div>

            <div class="shabbat-grid">
                <div class="shabbat-column">
                    <h4>🌅 ערב שבת</h4>
                    <div class="time-item"><span>מנחה גדולה</span> <span id="fri-mincha-gedola" class="time-value">--:--</span></div>
                    <div class="time-item"><span>הדלקת נרות</span> <span id="candle-lighting" class="time-value highlight-time">--:--</span></div>
                    <div class="time-item"><span>מנחה ערב שבת (14 ד' אחרי)</span> <span id="fri-mincha-regular" class="time-value">--:--</span></div>
                    <div class="time-item"><span>מנחה נוספת (בזמן נרות)</span> <span id="fri-mincha-extra" class="time-value">--:--</span></div>
                    <div class="time-item"><span>צאת הכוכבים</span> <span id="tzeit-stars" class="time-value">--:--</span></div>
                </div>
     
                <div class="shabbat-column">
                    <h4>✡️ יום השבת</h4>
                    <div class="time-item"><span>מנחה של שבת (שעתיים ו-10 לפני צאת שבת)</span> <span id="sat-mincha-regular" class="time-value">--:--</span></div>
                    <div class="time-item"><span>שקיעה</span> <span id="shabbat-shkiya" class="time-value">--:--</span></div>
                    <div class="time-item"><span>צאת שבת וערבית</span> <span id="tzeit-shabbat" class="time-value highlight-time">--:--</span></div>
                </div>
            </div>
        </section>

        <section class="section">
            <div class="section-header"><h2 class="section-title">תפילות חול</h2></div>
            <div class="schedule-row"><span>מנחה</span> <span id="weekday-mincha" class="schedule-times">--:--</span></div>
            <div class="schedule-row"><span>ערבית</span> <span id="weekday-arvit" class="schedule-times">--:--</span></div>
        </section>
    </div>

    <script>
        function addMinutes(timeStr, minutesToAdd) {
            if (!timeStr) return "--:--";
            const [hours, minutes] = timeStr.split(':').map(Number);
            const date = new Date();
            date.setHours(hours, minutes + minutesToAdd);
            return date.getHours().toString().padStart(2, '0') + ":" + 
                   date.getMinutes().toString().padStart(2, '0');
        }

        async function loadData() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();

                document.getElementById('parsha-title').textContent = `זמני השבת - ${data.parsha}`;
                
                const candles = data.shabbat_times.erev_shabbat.candle_lighting;
                const tzeitShabbat = data.shabbat_times.shabbat_day.tzeit_shabbat;

                // עדכון ערב שבת
                document.getElementById('fri-mincha-gedola').textContent = data.shabbat_times.erev_shabbat.mincha_gedola;
                document.getElementById('candle-lighting').textContent = candles;
                document.getElementById('fri-mincha-regular').textContent = addMinutes(candles, 14);
                document.getElementById('fri-mincha-extra').textContent = candles;
                document.getElementById('tzeit-stars').textContent = data.shabbat_times.erev_shabbat.tzeit_hakochavim;

                // עדכון יום שבת
                document.getElementById('shabbat-shkiya').textContent = data.shabbat_times.shabbat_day.shkiya;
                document.getElementById('tzeit-shabbat').textContent = tzeitShabbat;
                document.getElementById('sat-mincha-regular').textContent = addMinutes(tzeitShabbat, -130);

                // עדכון חול
                document.getElementById('weekday-mincha').textContent = data.weekday_times.mincha.join(' | ');
                document.getElementById('weekday-arvit').textContent = data.weekday_times.arvit.join(' | ');

            } catch (e) { console.error("Error loading JSON:", e); }
        }

        window.onload = loadData;
    </script>
</body>
</html>
