<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>זמני תפילה - כפר תפוח</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alef&family=Frank+Ruhl+Libre:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-navy: #0a1628;
            --royal-blue: #1e3a5f;
            --gold: #d4af37;
            --cream: #faf8f3;
            --soft-white: #ffffff;
            --charcoal: #2a2a2a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Alef', sans-serif;
            background: var(--cream);
            color: var(--charcoal);
            line-height: 1.6;
            padding-bottom: 2rem;
        }

        header {
            background: linear-gradient(135deg, var(--deep-navy) 0%, var(--royal-blue) 100%);
            color: var(--soft-white);
            padding: 2rem 1rem;
            text-align: center;
            border-bottom: 3px solid var(--gold);
        }

        .synagogue-name {
            font-family: 'Frank Ruhl Libre', serif;
            font-size: 1.8rem;
            font-weight: 400;
            margin-bottom: 0.3rem;
        }

        .parsha-title {
            color: var(--gold);
            font-size: 1.2rem;
            font-weight: 300;
        }

        .container {
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .card {
            background: var(--soft-white);
            border-radius: 12px;
            padding: 1.2rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border-right: 4px solid var(--royal-blue);
        }

        .card-header {
            font-family: 'Frank Ruhl Libre', serif;
            font-size: 1.4rem;
            color: var(--royal-blue);
            margin-bottom: 1rem;
            border-bottom: 1px solid #eee;
            padding-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 400;
        }

        .time-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.7rem 0;
            border-bottom: 1px solid #f9f9f9;
        }

        .time-row:last-child {
            border-bottom: none;
        }

        .label {
            font-size: 1rem;
            color: #555;
        }

        .value {
            font-family: 'Frank Ruhl Libre', serif;
            font-size: 1.1rem;
            color: var(--royal-blue);
            background: #f0f4f8;
            padding: 0.2rem 0.7rem;
            border-radius: 5px;
        }

        .highlight .value {
            background: #fff9e6;
            color: #b8860b;
        }

        .weekday-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .time-chip {
            background: #e8f2ff;
            color: var(--royal-blue);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.95rem;
        }

        footer {
            text-align: center;
            font-size: 0.85rem;
            color: #888;
            margin-top: 1rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="synagogue-name">בית הכנסת המרכזי כפר תפוח</div>
        <div class="parsha-title" id="parsha-display">טוען נתונים...</div>
    </header>

    <div class="container">
        <section class="card">
            <h2 class="card-header">🕯️ ערב שבת</h2>
            <div class="time-row">
                <span class="label">מנחה גדולה</span>
                <span class="value" id="mincha-gedola">--:--</span>
            </div>
            <div class="time-row highlight">
                <span class="label">הדלקת נרות</span>
                <span class="value" id="candle-lighting">--:--</span>
            </div>
            <div class="time-row">
                <span class="label">צאת הכוכבים</span>
                <span class="value" id="tzeit-kochavim">--:--</span>
            </div>
        </section>

        <section class="card">
            <h2 class="card-header">✡️ יום השבת</h2>
            <div class="time-row">
                <span class="label">שקיעה</span>
                <span class="value" id="shkiya">--:--</span>
            </div>
            <div class="time-row highlight">
                <span class="label">צאת שבת</span>
                <span class="value" id="tzeit-shabbat">--:--</span>
            </div>
        </section>

        <section class="card">
            <h2 class="card-header">📅 ימי חול</h2>
            <div style="margin-bottom: 1rem;">
                <span class="label">מנחה:</span>
                <div class="weekday-list" id="weekday-mincha"></div>
            </div>
            <div>
                <span class="label">ערבית:</span>
                <div class="weekday-list" id="weekday-arvit"></div>
            </div>
        </section>
    </div>

    <footer>
        נבנה לרווחת המתפללים | תשפ"ו
    </footer>

    <script>
        // הנתונים כפי שסיפקת
        const jsonData = {
            "parsha": "ויקהל פקודי - החודש",
            "shabbat_times": {
                "erev_shabbat": {
                    "mincha_gedola": "12:20",
                    "candle_lighting": "17:19",
                    "tzeit_hakochavim": "18:08"
                },
                "shabbat_day": {
                    "shkiya": "17:51",
                    "tzeit_shabbat": "18:23"
                }
            },
            "weekday_times": {
                "mincha": ["13:15", "17:35"],
                "arvit": ["18:15", "20:00", "21:00"]
            }
        };

        function renderData(data) {
            // כותרת פרשה
            document.getElementById('parsha-display').textContent = "פרשת " + data.parsha;

            // זמני ערב שבת
            document.getElementById('mincha-gedola').textContent = data.shabbat_times.erev_shabbat.mincha_gedola;
            document.getElementById('candle-lighting').textContent = data.shabbat_times.erev_shabbat.candle_lighting;
            document.getElementById('tzeit-kochavim').textContent = data.shabbat_times.erev_shabbat.tzeit_hakochavim;

            // זמני יום השבת
            document.getElementById('shkiya').textContent = data.shabbat_times.shabbat_day.shkiya;
            document.getElementById('tzeit-shabbat').textContent = data.shabbat_times.shabbat_day.tzeit_shabbat;

            // ימי חול - מנחה
            const minchaContainer = document.getElementById('weekday-mincha');
            minchaContainer.innerHTML = data.weekday_times.mincha
                .map(t => `<span class="time-chip">${t}</span>`).join('');

            // ימי חול - ערבית
            const arvitContainer = document.getElementById('weekday-arvit');
            arvitContainer.innerHTML = data.weekday_times.arvit
                .map(t => `<span class="time-chip">${t}</span>`).join('');
        }

        // הפעלת הפונקציה בטעינת הדף
        window.onload = () => renderData(jsonData);
    </script>
</body>
</html>
