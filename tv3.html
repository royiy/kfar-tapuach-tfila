<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בית הכנסת המרכזי – כפר תפוח (תצוגת מסך)</title>
    <link href="https://fonts.googleapis.com/css2?family=Alef:wght@400;700&family=Frank+Ruhl+Libre:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-navy: #0a1628; 
            --royal-blue: #1e3a5f; 
            --gold: #d4af37;
            --warm-gold: #f4e4c1; 
            --cream: #faf8f3; 
            --soft-white: #ffffff;
            --charcoal: #2a2a2a; 
            --shadow-blue: rgba(30, 58, 95, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Alef', sans-serif; 
            background: var(--cream); 
            color: var(--charcoal); 
            height: 100vh;
            width: 100vw;
            overflow: hidden; 
            position: relative;
        }

        /* ── Container for Screens ── */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            transition: opacity 1.5s ease-in-out;
            background: var(--cream);
        }

        .hidden { opacity: 0; pointer-events: none; }
        .visible { opacity: 1; z-index: 10; }

        /* ── Hero & Content Styles (Shared) ── */
        .hero { 
            background: linear-gradient(165deg, var(--deep-navy) 0%, var(--royal-blue) 100%); 
            padding: 2vh 3vw; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 6px solid var(--gold);
            flex-shrink: 0;
        }

        .synagogue-title { font-family: 'Frank Ruhl Libre', serif; font-size: 4.5vh; font-weight: 900; color: var(--soft-white); line-height: 1.1; }
        .location { font-family: 'Frank Ruhl Libre', serif; font-size: 2.2vh; color: var(--warm-gold); font-weight: 300; }
        #live-clock { font-family: 'Frank Ruhl Libre', serif; font-size: 5vh; font-weight: 700; color: var(--warm-gold); direction: ltr; }
        #live-date { font-size: 2.2vh; color: var(--soft-white); }

        .main-content { 
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 2vw;
            padding: 3vh 2vw;
        }

        /* ── Column Cards ── */
        .column-card { 
            background: var(--soft-white); 
            border-radius: 20px; 
            padding: 2.5vh 2vw; 
            box-shadow: 0 10px 30px var(--shadow-blue); 
            display: flex;
            flex-direction: column;
            border-top: 6px solid var(--gold); 
        }

        .card-header { display: flex; align-items: center; gap: 1vw; margin-bottom: 2vh; border-bottom: 2px solid #f0ede3; padding-bottom: 1.5vh; }
        .card-title { font-family: 'Frank Ruhl Libre', serif; font-size: 3.5vh; font-weight: 700; color: var(--royal-blue); }

        .time-item { display: flex; justify-content: space-between; align-items: center; padding: 1.2vh 0; border-bottom: 1px solid #f5f2e8; }
        .time-value { font-family: 'Frank Ruhl Libre', serif; font-size: 3.2vh; font-weight: 700; color: var(--royal-blue); background: #e8f2ff; padding: 0.5vh 1vw; border-radius: 8px; }

        .highlight-time { 
            background: linear-gradient(135deg, #fff9e6, #ffe8b8) !important; 
            color: #b8860b !important; 
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
        }

        /* ── Memorial Section ── */
        .memorial-section { background: var(--deep-navy); padding: 1.5vh 2vw; text-align: center; border-top: 2px solid var(--gold); }
        .memorial-name { font-family: 'Frank Ruhl Libre', serif; font-size: 2.8vh; color: var(--warm-gold); opacity: 0; transition: opacity 1s; }
        .memorial-name.visible-text { opacity: 1; }

        /* ── Announcements Screen ── */
        .announcements-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 5vh;
            background: radial-gradient(circle, #ffffff 0%, #f4e4c1 100%);
        }

        .announcement-box {
            background: white;
            padding: 8vh 5vw;
            border-radius: 40px;
            border: 10px double var(--gold);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            max-width: 80%;
        }

        .announcement-title { font-family: 'Frank Ruhl Libre', serif; font-size: 8vh; color: var(--royal-blue); margin-bottom: 4vh; }
        .announcement-text { font-size: 5vh; line-height: 1.4; color: var(--charcoal); }

        /* Video Hidden */
        #preventSleepVideo { position: fixed; right: 0; bottom: 0; width: 1px; height: 1px; opacity: 0.01; z-index: -1; }
    </style>
</head>
<body>

    <video id="preventSleepVideo" autoplay loop muted playsinline>
        <source src="https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerEscapes.mp4" type="video/mp4">
    </video>

    <div id="times-screen" class="screen visible">
        <header class="hero">
            <div class="header-right">
                <div class="synagogue-title">בית הכנסת המרכזי</div>
                <div class="location">כפר תפוח</div>
            </div>
            <div class="header-center" style="text-align:center; color:white;">
                <div class="parsha-label" style="color:var(--warm-gold)">פרשת השבוע</div>
                <div id="parsha-name" style="font-size:3.5vh; font-weight:bold;">טוען...</div>
            </div>
            <div class="header-left" style="text-align:left;">
                <div id="live-clock">--:--:--</div>
                <div id="live-date"></div>
            </div>
        </header>

        <div class="main-content">
            <div class="column-card">
                <div class="card-header"><span style="font-size:4vh">🌅</span><h2 class="card-title">ערב שבת</h2></div>
                <div class="time-item"><span>הדלקת נרות</span><span id="candle-lighting" class="time-value">--:--</span></div>
                <div class="time-item"><span>מנחה ערב שבת</span><span id="fri-mincha-regular" class="time-value">--:--</span></div>
            </div>
            <div class="column-card">
                <div class="card-header"><span style="font-size:4vh">✨</span><h2 class="card-title">יום השבת</h2></div>
                <div class="time-item"><span>שחרית</span><span id="sat-shacharit" class="time-value">08:00</span></div>
                <div class="time-item"><span>צאת שבת</span><span id="tzeit-shabbat" class="time-value">--:--</span></div>
            </div>
            <div class="column-card">
                <div class="card-header"><span style="font-size:4vh">🕍</span><h2 class="card-title">תפילות חול</h2></div>
                <div id="weekday-shacharit" style="margin-top:10px;"></div>
            </div>
        </div>

        <div class="memorial-section">
            <span class="memorial-name" id="memorial-current"></span>
        </div>
    </div>

    <div id="announcement-screen" class="screen hidden">
        <div class="announcements-container">
            <div class="announcement-box">
                <div class="announcement-title">הודעות הציבור</div>
                <div id="announcement-text" class="announcement-text">
                    ברוכים הבאים לבית הכנסת!<br>
                    נא לשמור על קדושת המקום ועל השקט.
                </div>
            </div>
        </div>
    </div>

    <script>
        /* ───── מנגנון החלפת מסכים ───── */
        const timesScreen = document.getElementById('times-screen');
        const announceScreen = document.getElementById('announcement-screen');
        const announceContent = document.getElementById('announcement-text');

        const announcements = [
            "ברוכים הבאים לבית הכנסת המרכזי!",
            "נא לכבות טלפונים ניידים לפני הכניסה.",
            "שיעור גמרא יתקיים הערב לאחר תפילת ערבית.",
            "ניתן להקדיש הודעות לעילוי נשמת או לרפואה."
        ];
        let announceIdx = 0;

        function toggleScreens() {
            // מעבר להודעה
            timesScreen.classList.replace('visible', 'hidden');
            announceScreen.classList.replace('hidden', 'visible');
            
            // עדכון טקסט הודעה
            announceContent.innerText = announcements[announceIdx];
            announceIdx = (announceIdx + 1) % announcements.length;

            // חזרה ללוח זמנים אחרי 10 שניות
            setTimeout(() => {
                announceScreen.classList.replace('visible', 'hidden');
                timesScreen.classList.replace('hidden', 'visible');
            }, 10000);
        }

        // הפעלה כל 40 שניות (30 שניות לוח זמנים + 10 שניות הודעה)
        setInterval(toggleScreens, 40000);

        /* ───── שעון ונתונים (הקוד הקיים שלך) ───── */
        function updateClock() {
            const now = new Date();
            document.getElementById('live-clock').textContent = now.toLocaleTimeString('he-IL', {hour12: false});
            const heDateFmt = new Intl.DateTimeFormat('he-IL-u-ca-hebrew', {day: 'numeric', month: 'long', year: 'numeric'});
            document.getElementById('live-date').textContent = heDateFmt.format(now);
        }
        setInterval(updateClock, 1000);
        updateClock();

        /* מניעת שומר מסך */
        const video = document.getElementById('preventSleepVideo');
        setInterval(() => { if(video.paused) video.play(); }, 5000);

        // לוגיקת טעינת נתונים (data.json) צריכה להישאר כאן כפי שהייתה קודם...
        async function loadData() {
            try {
                const res = await fetch('data.json?v=' + Date.now());
                const data = await res.json();
                document.getElementById('parsha-name').textContent = data.parsha;
                document.getElementById('candle-lighting').textContent = data.shabbat_times.erev_shabbat.candle_lighting;
                document.getElementById('tzeit-shabbat').textContent = data.shabbat_times.shabbat_day.tzeit_shabbat;
            } catch (e) { console.log("Data load error"); }
        }
        loadData();

    </script>
</body>
</html>
